  <style>
    /* Custom Scrollbar for Webkit browsers */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #1C1C1C;
      border-radius: 10px;
    }

    }

    /* Light mode scrollbar */
    html.light .custom-scrollbar::-webkit-scrollbar-track {

    }
